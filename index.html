<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bludcl.art</title> 
    <meta property="og:title" content="bludcl.art">
    <meta property="og:description" content="L7 still hasnt sent banner.py">
    <meta property="og:image" content="">
    <meta property="og:url" content="">
    <meta name="twitter:card" content="">
    <style>
        body {
            margin: 0; 
            overflow: hidden;
            background-color: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .image-container {
            position: relative;
            overflow: hidden; 
            border-radius: 15px;
            width: 38vw;
            height: 20vw; 
            z-index: 2; /* Set higher z-index for the image container */
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border-radius: 15px;
        }

        .image-overlay img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .snowflake {
            position: absolute;
            display: block;
            font-size: 16px;
            z-index: 1; /* Set lower z-index for the snowflake */
        }
    </style>
</head>
<body>
    <div class="image-container">
        <div class="image-overlay">
            <img src="https://cdn.discordapp.com/attachments/1166714209275486339/1196438354800160788/IMG_6914.png?ex=65b7a10c&is=65a52c0c&hm=47b7ac2c22381dae12dea62756429d7c7cc0a3b155bfccbd51e70df3edc523e2&" alt="Curved Edges Image">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const createSnowflake = () => {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                snowflake.innerHTML = '*';
                snowflake.style.left = `${Math.random() * window.innerWidth}px`;
                snowflake.style.top = '0';
                document.body.appendChild(snowflake);

                const fall = () => {
                    const currentY = parseFloat(getComputedStyle(snowflake).top);
                    const newY = currentY + 1;

                    if (newY > window.innerHeight) {
                        snowflake.remove();
                    } else {
                        snowflake.style.top = `${newY}px`;
                        requestAnimationFrame(fall);
                    }
                };

                requestAnimationFrame(fall);
            };

            const isPageVisible = () => !document.hidden;

            const createSnowflakesIfVisible = () => {
                if (isPageVisible()) {
                    createSnowflake();
                }
            };

            setInterval(createSnowflakesIfVisible, 500);
        });
    </script>
</body>
</html>
